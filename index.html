<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bring Your Dog</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <link rel="apple-touch-icon" href="./assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQPDn5EA+T5iEki6hthkE4N2oX7uRLM="
      crossorigin=""
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Map controls and places">
        <header class="sidebar-header">
          <div class="brand-lockup">
            <img class="brand-logo" src="./assets/logo.png" alt="">
            <div class="brand-copy">
              <h1>Bring Your Dog</h1>
            </div>
          </div>
          <div class="header-meta">
            <span class="area-pill">Melbourne inner suburbs</span>
            <p class="summary">Dog-friendly cafes, pubs, parks and shops across Melbourne inner suburbs.</p>
          </div>
        </header>

        <div class="search-wrap">
          <label for="search">Search places</label>
          <input id="search" type="search" placeholder="Search by name, suburb, or feature" autocomplete="off">
          <button class="search-clear" type="button" aria-label="Clear search" data-clear-search hidden>
            <img src="./assets/icons/eraseicon.svg" alt="">
          </button>
          <div id="searchSuggestions" class="search-suggestions" data-search-suggestions hidden>
            <p class="search-suggestions-title">Pawpular today</p>
            <div class="search-suggestions-list" role="listbox" aria-label="Pawpular today"></div>
          </div>
        </div>

        <section id="selectedPlace" class="selected-place" aria-live="polite">
          <p class="empty-selection">Select a place to see details.</p>
        </section>

        <div class="results-meta" aria-live="polite">
          <span id="resultCount">Loading places...</span>
        </div>

        <ol id="placeList" class="place-list" aria-label="Bring Your Dog places"></ol>
      </aside>

      <section class="map-panel" aria-label="Bring Your Dog Melbourne map">
        <div class="category-filters map-overlay" aria-label="Category filters">
          <button class="filter-button active" data-category="Cafe" type="button">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <img src="./assets/icons/cafe-marker.png" alt=""> Cafe
          </button>
          <button class="filter-button active" data-category="Pub/Bar" type="button">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <img src="./assets/icons/pub-marker.png" alt=""> Pub/Bar
          </button>
          <button class="filter-button active" data-category="Park" type="button">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <img src="./assets/icons/park-marker.png" alt=""> Park
          </button>
          <button class="filter-button active" data-category="Shop" type="button">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <img src="./assets/icons/shop-marker.png" alt=""> Shop
          </button>
        </div>
        <button id="mapExpandToggle" class="map-expand-toggle" type="button" aria-expanded="false" aria-label="Expand map">
          <span class="map-expand-symbol" aria-hidden="true"><img src="./assets/icons/expandicon.svg" alt=""></span>
        </button>
        <div class="desktop-zoom-controls" aria-label="Map zoom controls">
          <button id="desktopZoomIn" class="desktop-zoom-button" type="button" aria-label="Zoom in">
            <img src="./assets/icons/zoominicon.svg" alt="">
          </button>
          <button id="desktopZoomOut" class="desktop-zoom-button" type="button" aria-label="Zoom out">
            <img src="./assets/icons/zoomouticon.svg" alt="">
          </button>
        </div>
        <div class="expanded-map-toolbar" aria-label="Expanded map controls">
          <button id="expandedMapHome" class="expanded-home-button" type="button" aria-label="Back to main screen">
            <img class="brand-logo" src="./assets/logo.png" alt="">
          </button>
          <div class="expanded-search-wrap">
            <img src="./assets/icons/searchicon.svg" alt="">
            <label class="sr-only" for="expandedSearch">Search places</label>
            <input id="expandedSearch" type="search" placeholder="Search places" autocomplete="off">
            <button class="search-clear" type="button" aria-label="Clear search" data-clear-search hidden>
              <img src="./assets/icons/eraseicon.svg" alt="">
            </button>
            <div id="expandedSearchSuggestions" class="search-suggestions" data-search-suggestions hidden>
              <p class="search-suggestions-title">Pawpular today</p>
              <div class="search-suggestions-list" role="listbox" aria-label="Pawpular today"></div>
            </div>
          </div>
          <button id="expandedFilterToggle" class="expanded-filter-button" type="button" aria-expanded="false" aria-controls="expandedFilterSheet" aria-label="Filter categories">
            <img src="./assets/icons/filtericon.svg" alt="">
            <span id="expandedFilterBadge" class="filter-count-badge" aria-hidden="true" hidden></span>
          </button>
        </div>
        <div id="expandedFilterSheet" class="expanded-filter-sheet" hidden>
          <div class="filter-sheet-card" role="dialog" aria-label="Filter categories">
            <h2>Filter places</h2>
            <div class="sheet-category-filters category-filters" aria-label="Expanded category filters">
              <button class="filter-button active" data-category="Cafe" type="button">
                <span class="filter-checkbox" aria-hidden="true"></span>
                <img src="./assets/icons/cafe-marker.png" alt=""> Cafe
              </button>
              <button class="filter-button active" data-category="Pub/Bar" type="button">
                <span class="filter-checkbox" aria-hidden="true"></span>
                <img src="./assets/icons/pub-marker.png" alt=""> Pub/Bar
              </button>
              <button class="filter-button active" data-category="Park" type="button">
                <span class="filter-checkbox" aria-hidden="true"></span>
                <img src="./assets/icons/park-marker.png" alt=""> Park
              </button>
              <button class="filter-button active" data-category="Shop" type="button">
                <span class="filter-checkbox" aria-hidden="true"></span>
                <img src="./assets/icons/shop-marker.png" alt=""> Shop
              </button>
            </div>
          </div>
        </div>
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./config.js"></script>
    <script src="./data/manual-photos.js"></script>
    <script src="./data/locations.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
